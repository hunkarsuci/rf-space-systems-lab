name: Notebook CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute-notebooks:
    name: Execute Jupyter notebooks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Jupyter dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter nbconvert ipykernel

      - name: Execute Lesson 1 notebook
        run: |
          mkdir -p /tmp/executed-notebooks

          jupyter nbconvert \
            --to notebook \
            --execute \
            00_engineering_python/01_numbers_units_scientific_notation/lesson.ipynb \
            --output-dir /tmp/executed-notebooks \
            --ExecutePreprocessor.timeout=120